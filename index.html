<script>
const LINKS = {
  saldos: "https://docs.google.com/spreadsheets/d/e/2PACX-1vToRsG2BMX-MUlgwdzNrOIW4t8frunQC9zk61qa1Dl7R7ouEEBcxFtwXswVZPeF1ZjkPeF9BNQNeo4s/pub?gid=0&single=true&output=csv",
  devedores: "https://docs.google.com/spreadsheets/d/e/2PACX-1vToRsG2BMX-MUlgwdzNrOIW4t8frunQC9zk61qa1Dl7R7ouEEBcxFtwXswVZPeF1ZjkPeF9BNQNeo4s/pub?gid=681465744&single=true&output=csv",
  despesas: "https://docs.google.com/spreadsheets/d/e/2PACX-1vToRsG2BMX-MUlgwdzNrOIW4t8frunQC9zk61qa1Dl7R7ouEEBcxFtwXswVZPeF1ZjkPeF9BNQNeo4s/pub?gid=693774367&single=true&output=csv",
  vendas: "https://docs.google.com/spreadsheets/d/e/2PACX-1vToRsG2BMX-MUlgwdzNrOIW4t8frunQC9zk61qa1Dl7R7ouEEBcxFtwXswVZPeF1ZjkPeF9BNQNeo4s/pub?gid=1274190543&single=true&output=csv",
  financiamento: "https://docs.google.com/spreadsheets/d/e/2PACX-1vToRsG2BMX-MUlgwdzNrOIW4t8frunQC9zk61qa1Dl7R7ouEEBcxFtwXswVZPeF1ZjkPeF9BNQNeo4s/pub?gid=70354758&single=true&output=csv",
  erdm: "https://docs.google.com/spreadsheets/d/e/2PACX-1vToRsG2BMX-MUlgwdzNrOIW4t8frunQC9zk61qa1Dl7R7ouEEBcxFtwXswVZPeF1ZjkPeF9BNQNeo4s/pub?gid=1919383226&single=true&output=csv"
};

function money(v){
  return Number(v||0).toLocaleString("pt-MZ") + " MT";
}

function toNumber(v){
  if(!v) return 0;
  return Number(String(v).replace(/\D/g,'')) || 0;
}

// 🔥 CARREGAMENTO RÁPIDO E SEGURO
function loadCSV(url){
  return fetch(url)
    .then(res => res.text())
    .then(text => {
      const linhas = text.split("\n").filter(l => l.trim() !== "");
      const headers = linhas[0].split(",");

      return linhas.slice(1).map(l => {
        const valores = l.split(",");
        let obj = {};
        headers.forEach((h,i)=> obj[h.trim()] = valores[i]);
        return obj;
      });
    })
    .catch(()=>[]);
}

// 🔥 FUNÇÃO INTELIGENTE PARA SOMAR QUALQUER SHEET
function somarTabela(dados){
  let total = 0;

  dados.forEach(linha => {

    const colunasPrioritarias = [
      "Valor","VALOR",
      "Saldo","SALDO",
      "Total","TOTAL",
      "Montante","MONTANTE",
      "SALDO DA EMPRESA","Saldo da Empresa"
    ];

    let encontrou = false;

    // 1. Tenta colunas conhecidas
    colunasPrioritarias.forEach(coluna => {
      if (linha[coluna] !== undefined && linha[coluna] !== "") {
        total += toNumber(linha[coluna]);
        encontrou = true;
      }
    });

    // 2. Se não encontrou, pega último número da linha
    if (!encontrou) {
      const valores = Object.values(linha);
      for (let i = valores.length - 1; i >= 0; i--) {
        const n = toNumber(valores[i]);
        if (n > 0) {
          total += n;
          break;
        }
      }
    }

  });

  return total;
}

// 🚀 INICIALIZAÇÃO
async function init(){

  document.getElementById("status").innerHTML = "🔄 A carregar...";

  const saldos = await loadCSV(LINKS.saldos);
  const vendas = await loadCSV(LINKS.vendas);
  const devedores = await loadCSV(LINKS.devedores);
  const despesas = await loadCSV(LINKS.despesas);
  const financiamento = await loadCSV(LINKS.financiamento);
  const erdm = await loadCSV(LINKS.erdm);

  // 🔥 CÁLCULOS CORRIGIDOS
  const totalSaldos = somarTabela(saldos);
  const totalVendas = somarTabela(vendas);
  const totalReceber = somarTabela(devedores);
  const totalDespesas = somarTabela(despesas);
  const totalFin = somarTabela(financiamento);
  const totalErdm = somarTabela(erdm);

  // KPI
  document.getElementById("saldoBancos").innerText = money(totalSaldos);
  document.getElementById("vendasOntem").innerText = money(totalVendas);
  document.getElementById("totalReceber").innerText = money(totalReceber);
  document.getElementById("valorPiso").innerText = money(totalReceber/2);
  document.getElementById("totalDespesas").innerText = money(totalDespesas);
  document.getElementById("saldoFinanciamento").innerText = money(totalFin);
  document.getElementById("saldoErdm").innerText = money(totalErdm);

  document.getElementById("status").innerHTML = "🟢 Dados carregados";
  document.getElementById("updatedAt").innerText =
    "Atualizado: " + new Date().toLocaleString();

}

init();
</script>
